<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keith's PokeBS -- Binder</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--surface:#111118;--surface2:#18181f;--border:#2a2a38;
  --accent:#f0c040;--green:#3ddc84;--purple:#a78bfa;--blue:#60a5fa;
  --muted:#555570;--text:#e8e8f0;--text2:#9090a8;
  --type-G:#3ddc84;--type-R:#e8503a;--type-W:#5ab5ff;--type-L:#f0c040;
  --type-P:#a78bfa;--type-F:#fb923c;--type-D:#888899;--type-M:#94a3b8;
  --type-N:#34d399;--type-C:#9090a8;--type-T:#555570;--type-E:#555570;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);pointer-events:none;z-index:999}
header{display:flex;align-items:center;justify-content:space-between;padding:24px 40px;border-bottom:1px solid var(--border);background:rgba(10,10,15,.95);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:baseline;gap:10px}
.logo-main{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:.04em;color:var(--accent);text-shadow:0 0 30px rgba(240,192,64,.4)}
.logo-sub{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--muted);letter-spacing:.2em;text-transform:uppercase}
#save-status{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted)}
.nav-bar{display:flex;align-items:center;gap:4px;padding:0 40px;background:var(--surface2);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.nav-bar::-webkit-scrollbar{display:none}
.nav-link{font-family:'DM Mono',monospace;font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;padding:12px 18px;color:var(--muted);text-decoration:none;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.nav-link:hover{color:var(--text)}.nav-link.active{color:var(--accent);border-bottom-color:var(--accent)}
main{padding:40px;max-width:1400px;margin:0 auto}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.06em;color:var(--text2);margin-bottom:4px}
.page-subtitle{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted);letter-spacing:.1em;margin-bottom:24px}

/* Top tabs (Binder / Pokedex) */
.top-tabs{display:flex;gap:4px;margin-bottom:24px;border-bottom:1px solid var(--border)}
.top-tab{font-family:'DM Mono',monospace;font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;padding:10px 22px;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);cursor:pointer;transition:all .2s;margin-bottom:-1px}
.top-tab:hover{color:var(--text)}.top-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* Set tabs */
.set-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:20px;border-bottom:1px solid var(--border)}
.set-tab{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;padding:8px 16px;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);cursor:pointer;transition:all .2s;margin-bottom:-1px;white-space:nowrap}
.set-tab:hover{color:var(--text)}.set-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* Controls */
.controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:18px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:6px}
.search-box{font-family:'DM Mono',monospace;font-size:.72rem;background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:7px 12px;color:var(--text);outline:none;width:200px;transition:border-color .15s}
.search-box:focus{border-color:var(--accent)}
.search-box::placeholder{color:var(--muted)}
.jump-box{font-family:'DM Mono',monospace;font-size:.72rem;background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:7px 12px;color:var(--text);outline:none;width:120px;transition:border-color .15s}
.jump-box:focus{border-color:var(--blue)}
.jump-box::placeholder{color:var(--muted)}
.ctrl-sep{width:1px;height:20px;background:var(--border);flex-shrink:0}
.filter-btn{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;padding:5px 12px;border:1px solid var(--border);border-radius:3px;background:none;color:var(--muted);cursor:pointer;transition:all .15s}
.filter-btn:hover{border-color:var(--text2);color:var(--text2)}
.filter-btn.active{background:rgba(240,192,64,.08);border-color:rgba(240,192,64,.4);color:var(--accent)}
.type-filter-btn{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.06em;text-transform:uppercase;padding:4px 9px;border:1px solid var(--border);border-radius:3px;background:none;color:var(--muted);cursor:pointer;transition:all .15s}
.type-filter-btn.active{font-weight:500}
.type-filter-btn[data-t="G"].active{border-color:var(--type-G);color:var(--type-G);background:rgba(61,220,132,.08)}
.type-filter-btn[data-t="R"].active{border-color:var(--type-R);color:var(--type-R);background:rgba(232,80,58,.08)}
.type-filter-btn[data-t="W"].active{border-color:var(--type-W);color:var(--type-W);background:rgba(90,181,255,.08)}
.type-filter-btn[data-t="L"].active{border-color:var(--type-L);color:var(--type-L);background:rgba(240,192,64,.08)}
.type-filter-btn[data-t="P"].active{border-color:var(--type-P);color:var(--type-P);background:rgba(167,139,250,.08)}
.type-filter-btn[data-t="F"].active{border-color:var(--type-F);color:var(--type-F);background:rgba(251,146,60,.08)}
.type-filter-btn[data-t="D"].active{border-color:var(--type-D);color:var(--type-D);background:rgba(136,136,153,.08)}
.type-filter-btn[data-t="M"].active{border-color:var(--type-M);color:var(--type-M);background:rgba(148,163,184,.08)}
.type-filter-btn[data-t="N"].active{border-color:var(--type-N);color:var(--type-N);background:rgba(52,211,153,.08)}
.type-filter-btn[data-t="T"].active{border-color:rgba(85,85,112,.5);color:var(--text2);background:rgba(85,85,112,.08)}
.progress-wrap{display:flex;align-items:center;gap:10px;margin-left:auto}
.progress-text{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--muted)}
.progress-bar-outer{width:120px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-bar-inner{height:100%;background:var(--green);border-radius:2px;transition:width .3s}
.reset-btn{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border:1px solid rgba(232,80,58,.3);border-radius:3px;color:rgba(232,80,58,.6);background:none;cursor:pointer;transition:all .15s}
.reset-btn:hover{border-color:rgba(232,80,58,.7);color:rgba(232,80,58,.9)}
.bulk-btn{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border:1px solid rgba(61,220,132,.25);border-radius:3px;color:rgba(61,220,132,.5);background:none;cursor:pointer;transition:all .15s}
.bulk-btn:hover{border-color:rgba(61,220,132,.6);color:rgba(61,220,132,.8)}

/* Rarity sections */
.rarity-section{margin-bottom:24px}
.rarity-header{display:flex;align-items:center;gap:12px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.rarity-label{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}
.rarity-count{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);opacity:.6}
.rarity-line{flex:1;height:1px;background:var(--border)}
.rarity-progress{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted)}
.rarity-check-all{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.06em;text-transform:uppercase;padding:2px 8px;border:1px solid var(--border);border-radius:2px;background:none;color:var(--muted);cursor:pointer;transition:all .15s}
.rarity-check-all:hover{border-color:var(--green);color:var(--green)}

/* Card grid */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:6px}
.card-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:4px;border:1px solid var(--border);border-left:3px solid transparent;cursor:pointer;transition:all .15s;user-select:none}
.card-item:hover{border-color:rgba(240,192,64,.3);background:rgba(240,192,64,.03)}
.card-item.collected{border-color:rgba(61,220,132,.35) !important;background:rgba(61,220,132,.04)}
.card-item.collected .card-name-txt{color:var(--text)}
.card-item.hidden{display:none}
.card-check{width:16px;height:16px;border-radius:2px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.card-item.collected .card-check{background:var(--green);border-color:var(--green)}
.card-item.collected .card-check::after{content:'✓';font-size:.7rem;color:#000;font-weight:700}
.card-info{flex:1;min-width:0}
.card-num{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--muted);letter-spacing:.08em;margin-bottom:1px}
.card-name-txt{font-size:.8rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .15s}
.card-rarity-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-C{background:#444460}.dot-U{background:#6666aa}.dot-R{background:#4488cc}
.dot-TW{background:#22c55e}.dot-EX{background:#88aaff}.dot-RH{background:#5588cc}
.dot-DR{background:#60a5fa}.dot-SR{background:var(--green)}.dot-IR{background:var(--green)}
.dot-UR{background:#ffaa44}.dot-SAR{background:#ff9933}.dot-SIR{background:var(--purple)}
.dot-HR{background:#fbbf24}.dot-MHR{background:var(--accent)}
.dot-MAR{background:#ff6644}

/* Type-colored left borders */
.type-G{border-left-color:var(--type-G)!important}
.type-R{border-left-color:var(--type-R)!important}
.type-W{border-left-color:var(--type-W)!important}
.type-L{border-left-color:var(--type-L)!important}
.type-P{border-left-color:var(--type-P)!important}
.type-F{border-left-color:var(--type-F)!important}
.type-D{border-left-color:var(--type-D)!important}
.type-M{border-left-color:var(--type-M)!important}
.type-N{border-left-color:var(--type-N)!important}
.type-C{border-left-color:var(--type-C)!important}
.type-T{border-left-color:rgba(85,85,112,.4)!important}

/* National Pokedex tab */
.dex-controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.dex-search{font-family:'DM Mono',monospace;font-size:.72rem;background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:7px 12px;color:var(--text);outline:none;width:220px}
.dex-search:focus{border-color:var(--accent)}
.dex-search::placeholder{color:var(--muted)}
.dex-stat{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);margin-left:auto}
.dex-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.dex-card{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:4px;border:1px solid var(--border);border-left:3px solid transparent}
.dex-card.caught{border-color:rgba(61,220,132,.35);background:rgba(61,220,132,.04)}
.dex-card.missing{opacity:.5}
.dex-num{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);min-width:36px}
.dex-name{font-size:.82rem;color:var(--text2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dex-card.caught .dex-name{color:var(--text)}
.dex-badge{font-family:'DM Mono',monospace;font-size:.55rem;padding:1px 6px;border-radius:2px;flex-shrink:0}
.dex-rarity-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dex-set{font-family:'DM Mono',monospace;font-size:.55rem;color:var(--muted)}
.dex-view-btn.active{background:rgba(240,192,64,.08)!important;color:var(--accent)!important}

.empty-msg{text-align:center;padding:40px;font-family:'DM Mono',monospace;font-size:.75rem;color:var(--muted)}
@media(max-width:768px){header{padding:16px 20px}main{padding:20px}.logo-main{font-size:1.6rem}.nav-bar{padding:0 20px}.card-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}}
</style>
</head>
<body>
<header>
  <div class="logo"><span class="logo-main">Keith's PokeBS</span><span class="logo-sub">Binder</span></div>
  <div id="save-status" style="font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted)">Collection saved automatically</div>
</header>
<nav class="nav-bar">
  <a class="nav-link" href="dashboard.html">&#128225; Tracker</a>
  <a class="nav-link" href="info.html">&#128218; Set Info</a>
  <a class="nav-link" href="pricing.html">&#128176; Pricing</a>
  <a class="nav-link active" href="binder.html">&#128194; Binder</a>
  <a class="nav-link" href="calendar.html">&#128197; Calendar</a>
  <a class="nav-link" href="retail-drops.html">&#128722; Retail Drops</a>
  <a class="nav-link" href="local.html">&#128506; Local</a>
  <a class="nav-link" href="invest.html">&#128200; Invest</a>
  <a class="nav-link" href="pricing-history.html">Price History</a>
  <a class="nav-link" href="help.html">&#10067; Help</a>
</nav>

<main>
  <div class="page-title">My Binder</div>
  <div class="page-subtitle">Click any card to mark as collected &nbsp;&#183;&nbsp; Saved automatically</div>

  <!-- Top-level tabs: Binder / National Pokedex -->
  <div class="top-tabs">
    <button class="top-tab active" id="tab-binder" onclick="showView('binder',this)">&#128194; Set Binder</button>
    <button class="top-tab" id="tab-dex" onclick="showView('dex',this)">&#127809; National Pokedex</button>
  </div>

  <!-- ── BINDER VIEW ── -->
  <div id="view-binder">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px">
      <label style="font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);flex-shrink:0">Set:</label>
      <select id="set-select" onchange="switchSet(this.value)" style="font-family:'DM Mono',monospace;font-size:.75rem;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:8px 14px;color:var(--text);outline:none;cursor:pointer;transition:border-color .15s;min-width:280px"></select>
    </div>

    <div class="controls">
      <input type="text" class="search-box" id="search-box" placeholder="Search cards..." oninput="applyFilters()">
      <input type="text" class="jump-box" id="jump-box" placeholder="Jump to #..." oninput="jumpToCard(this.value)">
      <div class="ctrl-sep"></div>
      <button class="filter-btn active" id="f-all"  onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" id="f-have" onclick="setFilter('have',this)">Have</button>
      <button class="filter-btn" id="f-need" onclick="setFilter('need',this)">Need</button>
      <div class="ctrl-sep"></div>
      <span style="font-family:'DM Mono',monospace;font-size:.58rem;color:var(--muted);letter-spacing:.06em">TYPE:</span>
      <button class="type-filter-btn" data-t="G" onclick="toggleType('G',this)">Grass</button>
      <button class="type-filter-btn" data-t="R" onclick="toggleType('R',this)">Fire</button>
      <button class="type-filter-btn" data-t="W" onclick="toggleType('W',this)">Water</button>
      <button class="type-filter-btn" data-t="L" onclick="toggleType('L',this)">Lightning</button>
      <button class="type-filter-btn" data-t="P" onclick="toggleType('P',this)">Psychic</button>
      <button class="type-filter-btn" data-t="F" onclick="toggleType('F',this)">Fighting</button>
      <button class="type-filter-btn" data-t="D" onclick="toggleType('D',this)">Darkness</button>
      <button class="type-filter-btn" data-t="M" onclick="toggleType('M',this)">Metal</button>
      <button class="type-filter-btn" data-t="N" onclick="toggleType('N',this)">Dragon</button>
      <button class="type-filter-btn" data-t="T" onclick="toggleType('T',this)">Trainer</button>
      <div class="progress-wrap">
        <div class="progress-text"><b id="prog-have">0</b> / <span id="prog-total">0</span></div>
        <div class="progress-bar-outer"><div class="progress-bar-inner" id="prog-bar" style="width:0%"></div></div>
        <div class="progress-text" id="prog-pct">0%</div>
        <button class="bulk-btn" onclick="bulkCheck()">Check Section</button>
        <button class="reset-btn" onclick="resetSet()">Reset</button>
      </div>
    </div>

    <div id="binder-content"></div>
  </div>

  <!-- ── NATIONAL POKEDEX VIEW ── -->
  <div id="view-dex" style="display:none">
    <div class="dex-controls">
      <div style="display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:3px;overflow:hidden;flex-shrink:0">
        <button class="dex-view-btn active" onclick="setDexView('pokemon',this)" style="font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;padding:6px 14px;border:none;background:none;color:var(--muted);cursor:pointer;transition:all .15s">&#127809; Pokemon</button>
        <button class="dex-view-btn" onclick="setDexView('trainers',this)" style="font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;padding:6px 14px;border:none;background:none;color:var(--muted);cursor:pointer;transition:all .15s">&#127942; Trainers</button>
      </div>
      <input type="text" class="dex-search" id="dex-search" placeholder="Search..." oninput="renderDex()">
      <div id="dex-filter-row" style="display:flex;gap:6px">
        <button class="filter-btn active" id="df-all"   onclick="setDexFilter('all',this)">All</button>
        <button class="filter-btn" id="df-caught"  onclick="setDexFilter('caught',this)">Caught</button>
        <button class="filter-btn" id="df-missing" onclick="setDexFilter('missing',this)">Missing</button>
      </div>
      <span class="dex-stat" id="dex-stat">-- / 1025</span>
    </div>
    <div class="dex-grid" id="dex-grid"></div>
  </div>
</main>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// RARITY CONFIG
// ─────────────────────────────────────────────────────────────────────────────
const RARITY_CONFIG = {
  C:   {label:'Common',                   dot:'dot-C',   order:1},
  U:   {label:'Uncommon / Trainer',       dot:'dot-U',   order:2},
  R:   {label:'Rare',                     dot:'dot-R',   order:3},
  TW:  {label:'Two-Prize / Trainer',      dot:'dot-TW',  order:4},
  RH:  {label:'Reverse Holo',             dot:'dot-RH',  order:5},
  DR:  {label:'Double Rare (ex)',          dot:'dot-DR',  order:6},
  EX:  {label:'Pokemon ex / Mega ex',     dot:'dot-EX',  order:6},
  SR:  {label:'Special Rare',             dot:'dot-SR',  order:7},
  IR:  {label:'Illustration Rare',        dot:'dot-IR',  order:7},
  SAR: {label:'Super Art Rare',           dot:'dot-SAR', order:8},
  UR:  {label:'Ultra Rare / Full Art',    dot:'dot-UR',  order:8},
  SIR: {label:'Special Illustration Rare',dot:'dot-SIR', order:9},

  MAR: {label:'Mega Attack Rare',         dot:'dot-MAR', order:10},
  MHR: {label:'Mega Hyper Rare',          dot:'dot-MHR', order:11},
};

const RARITY_ORDER = {C:1,U:2,R:3,TW:4,RH:5,DR:6,EX:6,SR:7,IR:7,SAR:8,UR:8,SIR:9,HR:9,MAR:10,MHR:11};

// ─────────────────────────────────────────────────────────────────────────────
// TYPE COLORS (energy type code → CSS var suffix)
// ─────────────────────────────────────────────────────────────────────────────
// t field in card data: G=Grass R=Fire W=Water L=Lightning P=Psychic
//   F=Fighting D=Darkness M=Metal N=Dragon C=Colorless T=Trainer E=Energy

// ─────────────────────────────────────────────────────────────────────────────
// SET DATA
// ─────────────────────────────────────────────────────────────────────────────
const SETS = {

  // ── Mega Evolution: Ascended Heroes ──────────────────────────────────────
  asc: {
    name:'Ascended Heroes',series:'Mega Evolution',code:'ASC',total:295,
    cards:[
      // Grass
      {n:'001',name:"Erika's Oddish",r:'C',t:'G',p:'Oddish'},
      {n:'002',name:"Erika's Gloom",r:'C',t:'G',p:'Gloom'},
      {n:'003',name:"Erika's Vileplume ex",r:'EX',t:'G',p:'Vileplume'},
      {n:'004',name:"Erika's Bellsprout",r:'C',t:'G',p:'Bellsprout'},
      {n:'005',name:"Erika's Weepinbell",r:'C',t:'G',p:'Weepinbell'},
      {n:'006',name:"Erika's Victreebel",r:'C',t:'G',p:'Victreebel'},
      {n:'007',name:"Erika's Tangela",r:'C',t:'G',p:'Tangela'},
      {n:'008',name:'Chikorita',r:'C',t:'G',p:'Chikorita'},
      {n:'009',name:'Bayleef',r:'C',t:'G',p:'Bayleef'},
      {n:'010',name:'Mega Meganium ex',r:'EX',t:'G',p:'Meganium'},
      {n:'011',name:'Wurmple',r:'C',t:'G',p:'Wurmple'},
      {n:'012',name:'Silcoon',r:'C',t:'G',p:'Silcoon'},
      {n:'013',name:'Beautifly',r:'C',t:'G',p:'Beautifly'},
      {n:'014',name:'Cascoon',r:'C',t:'G',p:'Cascoon'},

// ─────────────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────────────
// Set display order: newest first (reverse chronological)
const SET_ORDER = ['cri','pfl2','meg1','por','asc','dri','bbl','jtg','pre','sps','scr'];

let currentSet  = 'cri';
let filterMode  = 'all';
let activeTypes = new Set();
let collection  = {};

// Storage keys -- v2 is current. v1 was previous version (migration handled in load())
function storageKey(s){ return `keithpokebsv2_${s}`; }

function load() {
  Object.keys(SETS).forEach(k => {
    try {
      const r2 = localStorage.getItem(`keithpokebsv2_${k}`);
      if (r2) { collection[k] = JSON.parse(r2); return; }
      // Fall back to old v1 key and migrate transparently
      const r1 = localStorage.getItem(`keithpokebsv1_${k}`);
      if (r1) {
        collection[k] = JSON.parse(r1);
        localStorage.setItem(`keithpokebsv2_${k}`, r1);
      } else {
        collection[k] = {};
      }
    }
    catch { collection[k] = {}; }
  });
}

function save() {
  try {
    localStorage.setItem(storageKey(currentSet), JSON.stringify(collection[currentSet]));
    const ts = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('save-status').textContent = 'Saved ' + ts;
  } catch(e) {
    document.getElementById('save-status').textContent = 'Save failed (storage full?)';
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// BUILD SET TABS
// ─────────────────────────────────────────────────────────────────────────────
function buildSetTabs() {
  const sel = document.getElementById('set-select');
  sel.innerHTML = SET_ORDER.map(k => {
    const s = SETS[k];
    const series = s.series ? ` (${s.series})` : '';
    return `<option value="${k}" ${k===currentSet?'selected':''}>${s.name}${series} — ${s.total} cards</option>`;
  }).join('');
}

function switchSet(k) {
  currentSet = k;
  document.getElementById('search-box').value = '';
  document.getElementById('jump-box').value = '';
  activeTypes.clear();
  document.querySelectorAll('.type-filter-btn').forEach(b=>b.classList.remove('active'));
  filterMode = 'all';
  document.querySelectorAll('#view-binder .filter-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('f-all').classList.add('active');
  render();
}

// ─────────────────────────────────────────────────────────────────────────────
// TOGGLE COLLECTION
// ─────────────────────────────────────────────────────────────────────────────
function toggle(setKey, cardNum) {
  if (!collection[setKey]) collection[setKey]={};
  if (collection[setKey][cardNum]) delete collection[setKey][cardNum];
  else collection[setKey][cardNum] = Date.now();

  const el = document.getElementById(`card-${setKey}-${cardNum}`);
  if (el) el.classList.toggle('collected', !!collection[setKey][cardNum]);

  updateProgress();
  updateSectionProgress();
  save();
  renderDex();
}

// ─────────────────────────────────────────────────────────────────────────────
// FILTERS
// ─────────────────────────────────────────────────────────────────────────────
function setFilter(mode, btn) {
  filterMode = mode;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function toggleType(t, btn) {
  if (activeTypes.has(t)) { activeTypes.delete(t); btn.classList.remove('active'); }
  else { activeTypes.add(t); btn.classList.add('active'); }
  applyFilters();
}

function applyFilters() {
  const q = (document.getElementById('search-box').value||'').toLowerCase();
  const col = collection[currentSet]||{};
  document.querySelectorAll('.card-item').forEach(el => {
    const num  = el.dataset.num;
    const name = el.dataset.name||'';
    const t    = el.dataset.t||'';
    let show   = true;
    if (q && !name.includes(q) && !num.includes(q)) show = false;
    if (filterMode==='have' && !col[num]) show = false;
    if (filterMode==='need' && col[num]) show = false;
    if (activeTypes.size > 0 && !activeTypes.has(t)) show = false;
    el.classList.toggle('hidden', !show);
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// JUMP TO CARD
// ─────────────────────────────────────────────────────────────────────────────
function jumpToCard(val) {
  if (!val) return;
  const padded = val.padStart(3,'0');
  const el = document.getElementById(`card-${currentSet}-${padded}`);
  if (el) el.scrollIntoView({behavior:'smooth', block:'center'});
}

// ─────────────────────────────────────────────────────────────────────────────
// BULK CHECK — mark entire visible/active rarity section
// ─────────────────────────────────────────────────────────────────────────────
let lastBulkRarity = null;
function bulkCheck() {
  // Find first rarity section that has at least 1 unchecked visible card
  const col = collection[currentSet]||{};
  const sections = document.querySelectorAll('.rarity-section');
  let targetSection = null;
  for (const sec of sections) {
    const unchecked = [...sec.querySelectorAll('.card-item:not(.hidden):not(.collected)')];
    if (unchecked.length > 0) { targetSection = sec; break; }
  }
  if (!targetSection) return;
  const toCheck = [...targetSection.querySelectorAll('.card-item:not(.hidden):not(.collected)')];
  toCheck.forEach(el => {
    const num = el.dataset.num;
    if (!collection[currentSet]) collection[currentSet]={};
    collection[currentSet][num] = Date.now();
    el.classList.add('collected');
  });
  updateProgress();
  updateSectionProgress();
  save();
  renderDex();
}

// ─────────────────────────────────────────────────────────────────────────────
// PROGRESS
// ─────────────────────────────────────────────────────────────────────────────
function updateProgress() {
  const set   = SETS[currentSet];
  const col   = collection[currentSet]||{};
  const have  = Object.keys(col).length;
  const total = set.cards.length;
  const pct   = total ? Math.round(have/total*100) : 0;
  document.getElementById('prog-have').textContent = have;
  document.getElementById('prog-total').textContent = total;
  document.getElementById('prog-bar').style.width = pct+'%';
  document.getElementById('prog-pct').textContent = pct+'%';
}

function updateSectionProgress() {
  const col = collection[currentSet]||{};
  document.querySelectorAll('.rarity-section').forEach(sec => {
    const cards = sec.querySelectorAll('.card-item');
    const total = cards.length;
    const have  = [...cards].filter(c=>col[c.dataset.num]).length;
    const prog  = sec.querySelector('.rarity-progress');
    if (prog) prog.textContent = `${have}/${total}`;
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// RESET
// ─────────────────────────────────────────────────────────────────────────────
function resetSet() {
  if (!confirm(`Reset all ${SETS[currentSet].name} collection data? This cannot be undone.`)) return;
  collection[currentSet]={};
  save();
  render();
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER BINDER
// ─────────────────────────────────────────────────────────────────────────────
function render() {
  const set = SETS[currentSet];
  const col = collection[currentSet]||{};

  // Group by rarity
  const groups = {};
  set.cards.forEach(card => {
    const r = card.r;
    if (!groups[r]) groups[r]=[];
    groups[r].push(card);
  });

  const sortedRarities = Object.keys(groups).sort(
    (a,b) => (RARITY_ORDER[a]||99)-(RARITY_ORDER[b]||99)
  );

  let html = '';
  sortedRarities.forEach(r => {
    const rc = RARITY_CONFIG[r]||{label:r,dot:'dot-C',order:99};
    const cards = groups[r];
    const have  = cards.filter(c=>col[c.n]).length;
    html += `<div class="rarity-section">
      <div class="rarity-header">
        <div class="rarity-label">${rc.label}</div>
        <div class="rarity-count">${cards.length} cards</div>
        <div class="rarity-line"></div>
        <div class="rarity-progress">${have}/${cards.length}</div>
        <button class="rarity-check-all" onclick="bulkCheckRarity('${r}')">Check All</button>
      </div>
      <div class="card-grid">`;

    cards.forEach(card => {
      const collected = !!col[card.n];
      const typeClass = card.t ? `type-${card.t}` : '';
      html += `<div class="card-item${collected?' collected':''} ${typeClass}"
        id="card-${currentSet}-${card.n}"
        data-num="${card.n}"
        data-name="${card.name.toLowerCase()}"
        data-t="${card.t||''}"
        onclick="toggle('${currentSet}','${card.n}')">
        <div class="card-check"></div>
        <div class="card-info">
          <div class="card-num">#${card.n}</div>
          <div class="card-name-txt">${card.name}</div>
        </div>
        <div class="card-rarity-dot ${rc.dot}"></div>
      </div>`;
    });

    html += `</div></div>`;
  });

  document.getElementById('binder-content').innerHTML = html;
  updateProgress();
  applyFilters();
}

function bulkCheckRarity(r) {
  const col = collection[currentSet]||{};
  const set = SETS[currentSet];
  const toCheck = set.cards.filter(c=>c.r===r && !col[c.n]);
  if (!toCheck.length) return;
  if (!collection[currentSet]) collection[currentSet]={};
  toCheck.forEach(c=>{
    collection[currentSet][c.n]=Date.now();
    const el=document.getElementById(`card-${currentSet}-${c.n}`);
    if (el) el.classList.add('collected');
  });
  updateProgress(); updateSectionProgress(); save(); renderDex();
}

function showView(v, btn) {
  document.querySelectorAll('.top-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('view-binder').style.display = v==='binder'?'block':'none';
  document.getElementById('view-dex').style.display    = v==='dex'?'block':'none';
  if (v==='dex') renderDex();
}

// Build a lookup: pokemon name (normalized) -> best collected card info
function buildCollectionLookup() {
  const pokeMap    = {}; // normalized name -> {rPriority, rarity, setKey, type, cardName}
  const trainerMap = {}; // trainer name -> {collected, cards:[]}

  Object.entries(SETS).forEach(([setKey, set]) => {
    const col = collection[setKey]||{};
    set.cards.forEach(card => {
      const isCollected = !!col[card.n];
      if (card.p) {
        // Pokemon card
        const key = card.p.toLowerCase();
        const rp  = RARITY_PRIORITY[card.r]||0;
        if (!pokeMap[key]) pokeMap[key] = {rPriority:0, rarity:null, setKey:null, type:null, cardName:null, caught:false};
        if (rp > pokeMap[key].rPriority) {
          pokeMap[key].rPriority = rp;
          pokeMap[key].rarity    = card.r;
          pokeMap[key].setKey    = setKey;
          pokeMap[key].type      = card.t;
          pokeMap[key].cardName  = card.name;
        }
        if (isCollected) {
          pokeMap[key].caught = true;
          // Also update best-collected tracking
          if (!pokeMap[key].bestCollected || rp > pokeMap[key].bestCollectedRp) {
            pokeMap[key].bestCollected   = card;
            pokeMap[key].bestCollectedRp = rp;
            pokeMap[key].bestCollectedSet= setKey;
          }
        }
      } else if (card.t === 'T') {
        // Trainer card — extract base trainer name (strip "ex ", " IR", " UR", etc.)
        const baseName = extractTrainerName(card.name);
        if (!baseName) return;
        if (!trainerMap[baseName]) trainerMap[baseName] = {collected:false, bestRarity:null, bestRp:0, sets:new Set()};
        trainerMap[baseName].sets.add(setKey);
        const rp = RARITY_PRIORITY[card.r]||0;
        if (rp > trainerMap[baseName].bestRp) {
          trainerMap[baseName].bestRp     = rp;
          trainerMap[baseName].bestRarity = card.r;
        }
        if (isCollected) trainerMap[baseName].collected = true;
      }
    });
  });
  return {pokeMap, trainerMap};
}

function extractTrainerName(cardName) {
  // Strip rarity suffixes, possessives, prefixes to get base trainer name
  // e.g. "Giovanni IR" -> "Giovanni", "Boss's Orders (Archer)" -> "Boss's Orders"
  // "Cynthia UR" -> "Cynthia", "Professor Research (Juniper)" -> "Professor Research"
  // Skip energy/item cards
  const trainerNames = [
    'Archer','Ariana','Billy','Boss\'s Orders','Brock','Buddy-Buddy Poffin',
    'Calem','Cynthia','Diantha','Erika','Ethan','Fennel','Giovanni',
    'Hop','Iono','Judge','Korrina','Lillie','Misty','N',
    'Naveen','Professor Research','Professor Sycamore','Rosa','Roxie',
    'Serena','Steven','Tarragon','Wally','Jacinthe','Diantha'
  ];
  const name = cardName.replace(/ (IR|UR|SIR|HR|MAR|MHR|SAR)$/, '').replace(/ \(.*\)$/, '').trim();
  // Check if it matches a known trainer name
  for (const t of trainerNames) {
    if (name === t || name.startsWith(t)) return t;
  }
  // Also match anything that looks like a supporter (not an item/stadium)
  // Heuristic: single capitalized word or two words without apostrophe-s patterns
  if (/^[A-Z][a-z]+$/.test(name) || /^[A-Z][a-z]+ [A-Z][a-z]+$/.test(name)) {
    return name;
  }
  return null;
}

function renderDex() {
  const q = (document.getElementById('dex-search').value||'').toLowerCase();
  const {pokeMap, trainerMap} = buildCollectionLookup();
  const rc = (r) => RARITY_CONFIG[r]||{label:r,dot:'dot-C'};
  const TYPE_COLORS = {G:'var(--type-G)',R:'var(--type-R)',W:'var(--type-W)',
    L:'var(--type-L)',P:'var(--type-P)',F:'var(--type-F)',D:'var(--type-D)',
    M:'var(--type-M)',N:'var(--type-N)',C:'var(--type-C)'};

  const grid = document.getElementById('dex-grid');

  if (dexView === 'trainers') {
    // ── TRAINER VIEW ──
    let trainers = Object.entries(trainerMap).sort((a,b)=>a[0].localeCompare(b[0]));
    if (q) trainers = trainers.filter(([n])=>n.toLowerCase().includes(q));
    if (dexFilter==='caught')  trainers = trainers.filter(([,v])=>v.collected);
    if (dexFilter==='missing') trainers = trainers.filter(([,v])=>!v.collected);

    const total   = Object.keys(trainerMap).length;
    const caught  = Object.values(trainerMap).filter(v=>v.collected).length;
    document.getElementById('dex-stat').textContent = `${caught} / ${total} trainers collected`;

    if (!trainers.length) { grid.innerHTML='<div class="empty-msg">No trainers found.</div>'; return; }

    grid.innerHTML = trainers.map(([name, v]) => {
      const setLabels = [...v.sets].map(k=>SETS[k]?.name.split(' ')[0]||k).join(', ');
      return `<div class="dex-card ${v.collected?'caught':'missing'}" style="border-left-color:var(--muted)">
        <div style="flex:1;min-width:0">
          <div class="dex-name">${name}</div>
          <div class="dex-set">${setLabels}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0">
          ${v.bestRarity ? `<div class="dex-rarity-dot ${rc(v.bestRarity).dot}"></div>` : ''}
        </div>
      </div>`;
    }).join('');
    return;
  }

  // ── POKEMON VIEW ──
  // All 1025 from National Dex, merged with collection lookup
  let rows = NATIONAL_DEX.map(([num, name]) => {
    const key  = name.toLowerCase();
    const info = pokeMap[key] || null;
    return {num, name, info, hasCard: !!info, caught: info?.caught||false};
  });

  if (q) rows = rows.filter(r=>r.name.toLowerCase().includes(q) || String(r.num).includes(q));
  if (dexFilter==='caught')  rows = rows.filter(r=>r.caught);
  if (dexFilter==='missing') rows = rows.filter(r=>!r.caught);

  const total  = NATIONAL_DEX.length;
  const caught = NATIONAL_DEX.filter(([,n])=>pokeMap[n.toLowerCase()]?.caught).length;
  const hasCard= NATIONAL_DEX.filter(([,n])=>pokeMap[n.toLowerCase()]?.rarity).length;
  document.getElementById('dex-stat').textContent =
    `${caught} / 1025 caught  \u00b7  ${hasCard} have TCG cards in your sets`;

  if (!rows.length) { grid.innerHTML='<div class="empty-msg">No Pokemon found.</div>'; return; }

  grid.innerHTML = rows.map(({num, name, info, hasCard, caught}) => {
    if (!hasCard) {
      // No card in any tracked set — show grayed out
      return `<div class="dex-card missing" style="opacity:.35;border-left-color:var(--border)">
        <div class="dex-num">#${String(num).padStart(4,'0')}</div>
        <div class="dex-name">${name}</div>
      </div>`;
    }
    const typeColor = TYPE_COLORS[info.type]||'var(--muted)';
    const setName   = SETS[info.setKey]?.name.split(' ')[0]||info.setKey;
    return `<div class="dex-card ${caught?'caught':'missing'}" style="border-left-color:${typeColor}">
      <div class="dex-num">#${String(num).padStart(4,'0')}</div>
      <div style="flex:1;min-width:0">
        <div class="dex-name">${name}</div>
        <div class="dex-set">${setName} · ${rc(info.rarity).label.split(' ')[0]}</div>
      </div>
      <div class="dex-rarity-dot ${rc(info.rarity).dot}" title="${rc(info.rarity).label}"></div>
    </div>`;
  }).join('');
}
