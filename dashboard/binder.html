<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keith's PokeBS — Binder</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0f;--surface:#111118;--surface2:#18181f;--border:#2a2a38;--accent:#f0c040;--accent2:#e8503a;--green:#3ddc84;--purple:#a78bfa;--muted:#555570;--text:#e8e8f0;--text2:#9090a8}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);pointer-events:none;z-index:999}
  header{display:flex;align-items:center;justify-content:space-between;padding:24px 40px;border-bottom:1px solid var(--border);background:rgba(10,10,15,.95);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
  .logo{display:flex;align-items:baseline;gap:10px}
  .logo-main{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:.04em;color:var(--accent);text-shadow:0 0 30px rgba(240,192,64,.4)}
  .logo-sub{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--muted);letter-spacing:.2em;text-transform:uppercase}
  .nav-bar{display:flex;align-items:center;gap:4px;padding:0 40px;background:var(--surface2);border-bottom:1px solid var(--border)}
  .nav-link{font-family:'DM Mono',monospace;font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;padding:12px 18px;color:var(--muted);text-decoration:none;border-bottom:2px solid transparent;transition:all .15s}
  .nav-link:hover{color:var(--text)}.nav-link.active{color:var(--accent);border-bottom-color:var(--accent)}
  main{padding:40px;max-width:1400px;margin:0 auto}
  .page-title{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.06em;color:var(--text2);margin-bottom:4px}
  .page-subtitle{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted);letter-spacing:.1em;margin-bottom:28px}

  /* Set tabs */
  .set-tabs{display:flex;gap:4px;margin-bottom:28px;border-bottom:1px solid var(--border)}
  .set-tab{font-family:'DM Mono',monospace;font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;padding:10px 20px;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);cursor:pointer;transition:all .2s;margin-bottom:-1px}
  .set-tab:hover{color:var(--text)}.set-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

  /* Controls bar */
  .controls{display:flex;gap:10px;margin-bottom:20px;align-items:center;flex-wrap:wrap}
  .search-box{font-family:'DM Mono',monospace;font-size:.75rem;background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:8px 14px;color:var(--text);outline:none;width:220px;transition:border-color .2s}
  .search-box::placeholder{color:var(--muted)}.search-box:focus{border-color:var(--accent)}
  .filter-btn{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;padding:8px 14px;background:var(--surface);border:1px solid var(--border);border-radius:3px;color:var(--muted);cursor:pointer;transition:all .15s}
  .filter-btn:hover,.filter-btn.active{border-color:var(--accent);color:var(--accent)}
  .progress-wrap{margin-left:auto;display:flex;align-items:center;gap:12px}
  .progress-text{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--text2)}
  .progress-text b{color:var(--accent)}
  .progress-bar-outer{width:140px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
  .progress-bar-inner{height:100%;background:var(--green);border-radius:3px;transition:width .3s}
  .reset-btn{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;padding:7px 12px;background:none;border:1px solid rgba(232,80,58,.3);border-radius:3px;color:var(--accent2);cursor:pointer;transition:all .15s}
  .reset-btn:hover{background:rgba(232,80,58,.08)}

  /* Section headers */
  .rarity-section{margin-bottom:32px}
  .rarity-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
  .rarity-label{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.08em;color:var(--text2)}
  .rarity-count{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:2px;padding:2px 8px}
  .rarity-line{flex:1;height:1px;background:var(--border)}
  .rarity-progress{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--green)}

  /* Card grid */
  .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}

  /* Card item */
  .card-item{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:10px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .15s;user-select:none}
  .card-item:hover{border-color:rgba(240,192,64,.3);background:rgba(240,192,64,.03)}
  .card-item.collected{border-color:rgba(61,220,132,.35);background:rgba(61,220,132,.04)}
  .card-item.collected .card-name-txt{color:var(--text)}
  .card-item.hidden{display:none}

  .card-check{width:18px;height:18px;border-radius:3px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
  .card-item.collected .card-check{background:var(--green);border-color:var(--green)}
  .card-item.collected .card-check::after{content:'✓';font-size:.75rem;color:#000;font-weight:700}

  .card-info{flex:1;min-width:0}
  .card-num{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);letter-spacing:.08em;margin-bottom:2px}
  .card-name-txt{font-size:.82rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .15s}

  .card-rarity-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .dot-common{background:#444460}.dot-uncommon{background:#6666aa}.dot-rare{background:#4488cc}
  .dot-ex{background:#88aaff}.dot-ir{background:var(--green)}.dot-ur{background:#ffaa44}
  .dot-mar{background:#ff6644}.dot-sir{background:var(--purple)}.dot-mhr{background:var(--accent)}

  /* Empty */
  .empty-msg{text-align:center;padding:40px;font-family:'DM Mono',monospace;font-size:.75rem;color:var(--muted)}

  @media(max-width:768px){header{padding:16px 20px}main{padding:20px}.logo-main{font-size:1.6rem}.nav-bar{padding:0 20px}.card-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}}
</style>

      <button class="reset-btn" onclick="resetSet()">Reset Set</button>
    </div>
  </div>

  <div id="binder-content"></div>
</main>

// ── Rarity config ─────────────────────────────────────────────────────
const RARITY_CONFIG = {
  C:   { label:'Common',                dot:'dot-common',   order:1 },
  U:   { label:'Uncommon / Trainer',    dot:'dot-uncommon', order:2 },
  R:   { label:'Rare',                  dot:'dot-rare',     order:3 },
  EX:  { label:'Pokémon ex / Mega ex',  dot:'dot-ex',       order:4 },
  IR:  { label:'Illustration Rare',     dot:'dot-ir',       order:5 },
  UR:  { label:'Ultra Rare / Full Art', dot:'dot-ur',       order:6 },
  MAR: { label:'Mega Attack Rare',      dot:'dot-mar',      order:7 },
  SIR: { label:'Special Illustration Rare', dot:'dot-sir',  order:8 },
  MHR: { label:'Mega Hyper Rare',       dot:'dot-mhr',      order:9 },
};

// ── State ─────────────────────────────────────────────────────────────
let currentSet = 'asc';
let filterMode = 'all';
let searchTerm = '';
let collection = {};

function storageKey(set) { return `keithpokebsv1_${set}`; }

function load() {
  try {
    const asc = localStorage.getItem(storageKey('asc'));
    const por = localStorage.getItem(storageKey('por'));
    collection.asc = asc ? JSON.parse(asc) : {};
    collection.por = por ? JSON.parse(por) : {};
  } catch(e) {
    collection = { asc:{}, por:{} };
  }
}

function save() {
  try {
    localStorage.setItem(storageKey('asc'), JSON.stringify(collection.asc));
    localStorage.setItem(storageKey('por'), JSON.stringify(collection.por));
    const t = new Date().toLocaleTimeString();
    document.getElementById('save-status').textContent = `Saved ${t}`;
  } catch(e) {
    document.getElementById('save-status').textContent = 'Save failed (private browsing?)';
  }
}

function toggle(setId, cardNum) {
  if (!collection[setId]) collection[setId] = {};
  if (collection[setId][cardNum]) delete collection[setId][cardNum];
  else collection[setId][cardNum] = 1;
  save();
  // Update just this card element
  const el = document.getElementById(`card-${setId}-${cardNum}`);
  if (el) {
    if (collection[setId][cardNum]) el.classList.add('collected');
    else el.classList.remove('collected');
    applyFilters();
  }
  updateProgress();
  updateSectionProgress();
}

function switchSet(setId, btn) {
  currentSet = setId;
  document.querySelectorAll('.set-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function setFilter(mode, btn) {
  filterMode = mode;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function applyFilters() {
  searchTerm = document.getElementById('search-box').value.toLowerCase();
  const col = collection[currentSet] || {};
  document.querySelectorAll('.card-item').forEach(el => {
    const num = el.dataset.num;
    const name = el.dataset.name;
    const have = !!col[num];
    let show = true;
    if (filterMode === 'have' && !have) show = false;
    if (filterMode === 'need' && have) show = false;
    if (searchTerm && !name.includes(searchTerm) && !num.includes(searchTerm)) show = false;
    el.classList.toggle('hidden', !show);
  });
  // Hide empty sections
  document.querySelectorAll('.rarity-section').forEach(sec => {
    const visible = sec.querySelectorAll('.card-item:not(.hidden)').length;
    sec.style.display = visible === 0 ? 'none' : '';
  });
}

function updateProgress() {
  const set = SETS[currentSet];
  const col = collection[currentSet] || {};
  const have = Object.keys(col).length;
  const total = set.cards.length;
  const pct = total ? Math.round(have/total*100) : 0;
  document.getElementById('prog-have').textContent = have;
  document.getElementById('prog-total').textContent = total;
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';
}

function updateSectionProgress() {
  const col = collection[currentSet] || {};
  document.querySelectorAll('.rarity-section').forEach(sec => {
    const cards = sec.querySelectorAll('.card-item');
    const total = cards.length;
    const have = [...cards].filter(c => col[c.dataset.num]).length;
    const prog = sec.querySelector('.rarity-progress');
    if (prog) prog.textContent = `${have}/${total}`;
  });
}

function resetSet() {
  if (!confirm(`Reset all ${currentSet.toUpperCase()} collection data? This cannot be undone.`)) return;
  collection[currentSet] = {};
  save();
  render();
}

function render() {
  const set = SETS[currentSet];
  const col = collection[currentSet] || {};

  // Group by rarity
  const groups = {};
  set.cards.forEach(card => {
    if (!groups[card.r]) groups[card.r] = [];
    groups[card.r].push(card);
  });

  // Sort groups by rarity order
  const sortedRarities = Object.keys(groups).sort(
    (a, b) => (RARITY_CONFIG[a]?.order || 99) - (RARITY_CONFIG[b]?.order || 99)
  );

  let html = '';
  sortedRarities.forEach(r => {
    const rc = RARITY_CONFIG[r] || { label: r, dot: 'dot-common' };
    const cards = groups[r];
    const have = cards.filter(c => col[c.n]).length;
    html += `<div class="rarity-section">
      <div class="rarity-header">
        <div class="rarity-label">${rc.label}</div>
        <div class="rarity-count">${cards.length} cards</div>
        <div class="rarity-line"></div>
        <div class="rarity-progress">${have}/${cards.length}</div>
      </div>
      <div class="card-grid">`;

    cards.forEach(card => {
      const collected = !!col[card.n];
      html += `<div class="card-item${collected?' collected':''}" id="card-${currentSet}-${card.n}" data-num="${card.n}" data-name="${card.name.toLowerCase()}" onclick="toggle('${currentSet}','${card.n}')">
        <div class="card-check"></div>
        <div class="card-info">
          <div class="card-num">#${card.n}</div>
          <div class="card-name-txt">${card.name}</div>
        </div>
        <div class="card-rarity-dot ${rc.dot}"></div>
      </div>`;
    });

    html += `</div></div>`;
  });

  document.getElementById('binder-content').innerHTML = html;
  updateProgress();
  applyFilters();
}

// ── Init ──────────────────────────────────────────────────────────────
load();
render();
</script>
